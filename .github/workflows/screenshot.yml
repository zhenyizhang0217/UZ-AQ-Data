name: Hourly Screenshot

on:
  schedule:
    - cron: '10 * * * *'
  workflow_dispatch:

jobs:
  screenshot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # 升级到 v4

      - name: Setup Node.js
        uses: actions/setup-node@v4 # 升级到 v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Install Browser and Dependencies
        # 必须安装浏览器和对应的系统库
        run: |
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk-bridge2.0-0 libxkbcommon0 libcomposite1 libasound2
          npx puppeteer browsers install chrome

      - name: Run screenshot script
        run: node screenshot.js

      - name: Upload screenshots
        uses: actions/upload-artifact@v4 
        with:
          name: hourly-screenshots
          path: "*.png"
          if-no-files-found: error 
