name: Hourly Screenshot to Repo

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

# 重要：授予 Actions 提交代码的权限
permissions:
  contents: write

jobs:
  screenshot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: |
          if [ ! -f package.json ]; then
            echo '{"dependencies": {"puppeteer": "^22.0.0"}}' > package.json
          fi
          npm install
          sudo apt-get update
          sudo apt-get install -y libgbm-dev libnss3 libatk-bridge2.0-0 libxkbcommon0 libxdamage1 libpango-1.0-0 libasound2t64 libcups2
          npx puppeteer browsers install chrome

      - name: Run screenshot script
        run: node screenshot.js

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add screenshots/*.png
          # 只有在有新文件时才提交，防止报错
          git diff --quiet && git diff --staged --quiet || (git commit -m "Add hourly screenshot $(date +'%Y-%m-%d %H:%M')" && git push)
